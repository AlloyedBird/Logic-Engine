<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bidirectional A* Interactive Demo</title>
<style>
  :root {
    --ink: #1f2937;
    --muted: #6b7280;
    --line: #e5e7eb;
    --start: #2f80ed;   /* blue  */
    --end: #f2994a;     /* orange */
    --accent: #2f80ed;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    background: #fafafa;
    color: var(--ink);
    font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  .wrap {
    max-width: 880px;
    margin: 0 auto;
    padding: 32px 20px 60px;
  }
  h1 {
    font-size: 1.4rem;
    font-weight: 600;
    margin: 0 0 4px;
  }
  .sub { color: var(--muted); margin: 0 0 24px; font-size: .92rem; }

  .layout {
    display: grid;
    grid-template-columns: 1fr;
    gap: 20px;
  }
  @media (min-width: 760px) {
    .layout { grid-template-columns: 1fr 210px; align-items: start; }
  }

  canvas {
    width: 100%;
    height: auto;
    display: block;
    border: 1px solid var(--line);
    border-radius: 8px;
    cursor: crosshair;
    touch-action: none;
  }

  .panel h2 {
    font-size: .72rem;
    text-transform: uppercase;
    letter-spacing: .6px;
    color: var(--muted);
    margin: 0 0 8px;
  }
  .panel h2:not(:first-child) { margin-top: 20px; }

  .tools { display: flex; flex-wrap: wrap; gap: 6px; }
  button {
    font: inherit;
    font-size: .88rem;
    color: var(--ink);
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 7px 11px;
    cursor: pointer;
    transition: background .12s, border-color .12s;
  }
  button:hover { background: #f3f4f6; }
  button.primary { background: var(--accent); color: #fff; border-color: transparent; }
  button.primary:hover { filter: brightness(1.05); }
  button.active { border-color: var(--accent); color: var(--accent); }

  .row { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin: 12px 0; font-size: .88rem; }
  .row label { color: var(--muted); }
  input[type=range] { width: 110px; accent-color: var(--accent); }

  .legend { display: grid; gap: 7px; font-size: .84rem; }
  .legend .item { display: flex; align-items: center; gap: 9px; }
  .swatch { width: 14px; height: 14px; border-radius: 3px; border: 1px solid var(--line); flex: none; }

  .stats { font-size: .84rem; color: var(--muted); line-height: 1.7; margin-top: 16px; }
  .stats b { color: var(--ink); font-weight: 600; }

  .hint { font-size: .82rem; color: var(--muted); margin-top: 16px; line-height: 1.5; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Bidirectional A*</h1>
  <p class="sub">Two searches grow at once one from the <span style="color:var(--start)">start</span>, one from the <span style="color:var(--end)">goal</span> until they meet.</p>

  <div class="layout">
    <div>
      <canvas id="grid" width="600" height="450"></canvas>
    </div>

    <div class="panel">
      <h2>Draw</h2>
      <div class="tools" id="tools">
        <button data-tool="wall" class="active">Wall</button>
        <button data-tool="erase">Erase</button>
        <button data-tool="start">Start</button>
        <button data-tool="end">Goal</button>
      </div>

      <h2>Run</h2>
      <div class="tools">
        <button id="run" class="primary">Run ▶</button>
        <button id="step">Step</button>
        <button id="clearPath">Reset</button>
        <button id="clearWalls">Clear</button>
        <button id="maze">Maze</button>
      </div>

      <div class="row">
        <label for="speed">Speed</label>
        <input type="range" id="speed" min="1" max="100" value="22">
      </div>
      <div class="row">
        <label for="diag">Diagonals</label>
        <input type="checkbox" id="diag" checked>
      </div>

      <h2>Legend</h2>
      <div class="legend">
        <div class="item"><span class="swatch" style="background:var(--start)"></span> Start</div>
        <div class="item"><span class="swatch" style="background:var(--end)"></span> Goal</div>
        <div class="item"><span class="swatch" style="background:#facc15"></span> Path</div>
        <div class="item"><span class="swatch" style="background:#374151"></span> Wall</div>
      </div>

      <div class="stats" id="stats">Nodes expanded: <b>0</b></div>
    </div>
  </div>

  <p class="hint">Pick a draw mode, then click and drag on the grid. Press Run to search.</p>
</div>

<script>
(() => {
  "use strict";

  // ---------- Grid configuration ----------
  const COLS = 40, ROWS = 30;
  const canvas = document.getElementById("grid");
  const ctx = canvas.getContext("2d");
  let cell = canvas.width / COLS; // square cells

  // Cell states stored in a typed array: 0 empty, 1 wall
  const walls = new Uint8Array(COLS * ROWS);
  let start = { x: 3, y: Math.floor(ROWS / 2) };
  let end   = { x: COLS - 4, y: Math.floor(ROWS / 2) };

  const idx = (x, y) => y * COLS + x;
  const inBounds = (x, y) => x >= 0 && y >= 0 && x < COLS && y < ROWS;

  // ---------- Colors ----------
  const css = (v) => getComputedStyle(document.documentElement).getPropertyValue(v).trim();
  const C = {
    cell: "#ffffff", grid: "#e5e7eb", wall: "#374151",
    start: "#2f80ed", end: "#f2994a",
    fFront: "#7eb0f2", fSeen: "#d3e3fb",
    bFront: "#f4b878", bSeen: "#fce3cb",
    path: "#facc15", meet: "#34c77b",
  };

  // ---------- Drawing ----------
  function draw(state) {
    ctx.fillStyle = C.cell;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    for (let y = 0; y < ROWS; y++) {
      for (let x = 0; x < COLS; x++) {
        const i = idx(x, y);
        let color = null;
        if (state) {
          if (state.fClosed[i]) color = C.fSeen;
          if (state.bClosed[i]) color = state.fClosed[i] ? C.meet : C.bSeen;
          if (state.fOpen[i]) color = C.fFront;
          if (state.bOpen[i]) color = C.bFront;
        }
        if (walls[i]) color = C.wall;
        if (color) {
          ctx.fillStyle = color;
          ctx.fillRect(x * cell, y * cell, cell, cell);
        }
      }
    }

    // path on top
    if (state && state.path) {
      ctx.fillStyle = C.path;
      for (const p of state.path) {
        ctx.fillRect(p.x * cell + cell * 0.18, p.y * cell + cell * 0.18, cell * 0.64, cell * 0.64);
      }
    }

    // grid lines
    ctx.strokeStyle = C.grid;
    ctx.lineWidth = 1;
    ctx.beginPath();
    for (let x = 0; x <= COLS; x++) { ctx.moveTo(x * cell, 0); ctx.lineTo(x * cell, ROWS * cell); }
    for (let y = 0; y <= ROWS; y++) { ctx.moveTo(0, y * cell); ctx.lineTo(COLS * cell, y * cell); }
    ctx.stroke();

    drawEndpoint(start, C.start);
    drawEndpoint(end, C.end);
  }

  function drawEndpoint(p, color) {
    const cx = p.x * cell + cell / 2, cy = p.y * cell + cell / 2;
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(cx, cy, cell * 0.36, 0, Math.PI * 2);
    ctx.fill();
    ctx.lineWidth = 2;
    ctx.strokeStyle = "rgba(255,255,255,.85)";
    ctx.stroke();
  }

  // ---------- Min-heap (binary) keyed on f ----------
  class Heap {
    constructor() { this.a = []; }
    get size() { return this.a.length; }
    push(node) {
      const a = this.a; a.push(node); let i = a.length - 1;
      while (i > 0) {
        const p = (i - 1) >> 1;
        if (a[p].f <= a[i].f) break;
        [a[p], a[i]] = [a[i], a[p]]; i = p;
      }
    }
    pop() {
      const a = this.a, top = a[0], last = a.pop();
      if (a.length) {
        a[0] = last; let i = 0;
        for (;;) {
          let l = 2 * i + 1, r = l + 1, s = i;
          if (l < a.length && a[l].f < a[s].f) s = l;
          if (r < a.length && a[r].f < a[s].f) s = r;
          if (s === i) break;
          [a[s], a[i]] = [a[i], a[s]]; i = s;
        }
      }
      return top;
    }
  }

  // ---------- Neighbors ----------
  let allowDiag = true;
  const ORTHO = [[1,0],[-1,0],[0,1],[0,-1]];
  const DIAG = [[1,1],[1,-1],[-1,1],[-1,-1]];
  function neighbors(x, y) {
    const out = [];
    for (const [dx, dy] of ORTHO) {
      const nx = x + dx, ny = y + dy;
      if (inBounds(nx, ny) && !walls[idx(nx, ny)]) out.push([nx, ny, 1]);
    }
    if (allowDiag) {
      for (const [dx, dy] of DIAG) {
        const nx = x + dx, ny = y + dy;
        if (!inBounds(nx, ny) || walls[idx(nx, ny)]) continue;
        // prevent corner-cutting through wall diagonals
        if (walls[idx(x + dx, y)] || walls[idx(x, y + dy)]) continue;
        out.push([nx, ny, Math.SQRT2]);
      }
    }
    return out;
  }

  // octile/euclidean-ish heuristic, consistent with the move costs
  function h(ax, ay, bx, by) {
    const dx = Math.abs(ax - bx), dy = Math.abs(ay - by);
    return allowDiag ? (dx + dy) + (Math.SQRT2 - 2) * Math.min(dx, dy)
                     : (dx + dy);
  }

  // ---------- Bidirectional A* (incremental, stepable) ----------
  function makeSearch() {
    const N = COLS * ROWS;
    const s = {
      fG: new Float64Array(N).fill(Infinity),
      bG: new Float64Array(N).fill(Infinity),
      fParent: new Int32Array(N).fill(-1),
      bParent: new Int32Array(N).fill(-1),
      fClosed: new Uint8Array(N),
      bClosed: new Uint8Array(N),
      fOpen: new Uint8Array(N),
      bOpen: new Uint8Array(N),
      fHeap: new Heap(),
      bHeap: new Heap(),
      meetNode: -1,
      bestPath: Infinity,
      done: false,
      expanded: 0,
      path: null,
    };

    const si = idx(start.x, start.y), ei = idx(end.x, end.y);
    s.fG[si] = 0; s.bG[ei] = 0;
    s.fOpen[si] = 1; s.bOpen[ei] = 1;
    s.fHeap.push({ i: si, x: start.x, y: start.y, f: h(start.x, start.y, end.x, end.y) });
    s.bHeap.push({ i: ei, x: end.x, y: end.y, f: h(end.x, end.y, start.x, start.y) });
    return s;
  }

  // expand one node from the given direction
  function expandSide(s, dir) {
    const fwd = dir === "f";
    const heap = fwd ? s.fHeap : s.bHeap;
    const G = fwd ? s.fG : s.bG;
    const oG = fwd ? s.bG : s.fG;
    const parent = fwd ? s.fParent : s.bParent;
    const closed = fwd ? s.fClosed : s.bClosed;
    const open = fwd ? s.fOpen : s.bOpen;
    const tx = fwd ? end.x : start.x, ty = fwd ? end.y : start.y;

    while (heap.size && closed[heap.a[0].i]) heap.pop(); // skip stale
    if (!heap.size) return;

    const cur = heap.pop();
    if (closed[cur.i]) return;
    closed[cur.i] = 1; open[cur.i] = 0;
    s.expanded++;

    // meeting check
    if (oG[cur.i] !== Infinity) {
      const total = G[cur.i] + oG[cur.i];
      if (total < s.bestPath) { s.bestPath = total; s.meetNode = cur.i; }
    }

    for (const [nx, ny, w] of neighbors(cur.x, cur.y)) {
      const ni = idx(nx, ny);
      if (closed[ni]) continue;
      const ng = G[cur.i] + w;
      if (ng < G[ni]) {
        G[ni] = ng;
        parent[ni] = cur.i;
        open[ni] = 1;
        heap.push({ i: ni, x: nx, y: ny, f: ng + h(nx, ny, tx, ty) });
      }
    }
  }

  // Stopping condition for bidirectional A*: stop when the cheapest
  // candidate on either frontier can't beat the best meeting path found.
  function shouldStop(s) {
    const ftop = topF(s.fHeap, s.fClosed);
    const btop = topF(s.bHeap, s.bClosed);
    if (ftop === Infinity && btop === Infinity) return true;
    return s.bestPath <= Math.min(ftop, btop);
  }
  function topF(heap, closed) {
    while (heap.size && closed[heap.a[0].i]) heap.pop();
    return heap.size ? heap.a[0].f : Infinity;
  }

  function buildPath(s) {
    if (s.meetNode < 0) return null;
    const path = [];
    let i = s.meetNode;
    while (i !== -1) { path.push({ x: i % COLS, y: (i / COLS) | 0 }); i = s.fParent[i]; }
    path.reverse();
    i = s.bParent[s.meetNode];
    while (i !== -1) { path.push({ x: i % COLS, y: (i / COLS) | 0 }); i = s.bParent[i]; }
    return path;
  }

  // run a fixed number of expansions, alternating sides
  function advance(s, count) {
    for (let k = 0; k < count && !s.done; k++) {
      // alternate, but pick the side with the smaller frontier key for balance
      const ftop = topF(s.fHeap, s.fClosed);
      const btop = topF(s.bHeap, s.bClosed);
      if (ftop === Infinity && btop === Infinity) { s.done = true; break; }
      if (shouldStop(s)) { s.done = true; break; }
      expandSide(s, ftop <= btop ? "f" : "b");
    }
    if (s.done) s.path = buildPath(s);
  }

  // ---------- Animation loop ----------
  let search = null;
  let timer = null;
  let running = false;

  function statsText(s) {
    const el = document.getElementById("stats");
    let msg = `Nodes expanded: <b>${s ? s.expanded : 0}</b>`;
    if (s && s.done) {
      msg += s.path
        ? `<br>Path length: <b>${(s.bestPath).toFixed(2)}</b><br><span style="color:var(--accent)">Path found ✓</span>`
        : `<br><span style="color:#eb5757">No path</span>`;
    }
    el.innerHTML = msg;
  }

  // Map the slider to a pace. Low end: one node at a time with a real
  // pause between expansions so the search is easy to follow. High end:
  // many nodes per tick with no delay.
  function pace() {
    const v = +document.getElementById("speed").value; // 1..100
    if (v <= 55) {
      const t = (v - 1) / 54;                 // 0 (slowest) .. 1
      return { steps: 1, delay: Math.round(500 - t * 480) }; // 500ms .. 20ms
    }
    const t = (v - 55) / 45;                   // 0 .. 1
    return { steps: Math.round(2 + t * 78), delay: 0 };      // 2 .. 80 per tick
  }

  function loop() {
    if (!running || !search) return;
    const { steps, delay } = pace();
    advance(search, steps);
    draw(search);
    statsText(search);
    if (search.done) { running = false; setRunLabel(); return; }
    timer = setTimeout(loop, delay);
  }

  function setRunLabel() {
    document.getElementById("run").textContent = running ? "Pause ⏸" : "Run ▶";
  }

  function startRun() {
    if (!search || search.done) search = makeSearch();
    running = true;
    setRunLabel();
    loop();
  }
  function pauseRun() { running = false; setRunLabel(); if (timer) clearTimeout(timer); }

  function reset() {
    pauseRun();
    search = null;
    draw(null);
    statsText(null);
  }

  // ---------- UI wiring ----------
  let tool = "wall";
  document.getElementById("tools").addEventListener("click", (e) => {
    const b = e.target.closest("button"); if (!b) return;
    tool = b.dataset.tool;
    [...e.currentTarget.children].forEach(c => c.classList.toggle("active", c === b));
  });

  document.getElementById("run").addEventListener("click", () => running ? pauseRun() : startRun());
  document.getElementById("step").addEventListener("click", () => {
    pauseRun();
    if (!search || search.done) search = makeSearch();
    advance(search, 1);
    draw(search); statsText(search);
    if (search.done) setRunLabel();
  });
  document.getElementById("clearPath").addEventListener("click", reset);
  document.getElementById("clearWalls").addEventListener("click", () => {
    walls.fill(0); reset();
  });
  document.getElementById("maze").addEventListener("click", () => {
    walls.fill(0);
    for (let i = 0; i < walls.length; i++) {
      const x = i % COLS, y = (i / COLS) | 0;
      if ((x === start.x && y === start.y) || (x === end.x && y === end.y)) continue;
      if (Math.random() < 0.28) walls[i] = 1;
    }
    reset();
  });
  document.getElementById("diag").addEventListener("change", (e) => {
    allowDiag = e.target.checked; reset();
  });

  // ---------- Painting on the grid ----------
  let painting = false;
  function cellFromEvent(e) {
    const r = canvas.getBoundingClientRect();
    const scaleX = canvas.width / r.width, scaleY = canvas.height / r.height;
    const px = (e.clientX - r.left) * scaleX, py = (e.clientY - r.top) * scaleY;
    return { x: Math.floor(px / cell), y: Math.floor(py / cell) };
  }
  function applyTool(x, y) {
    if (!inBounds(x, y)) return;
    const i = idx(x, y);
    const isStart = x === start.x && y === start.y;
    const isEnd = x === end.x && y === end.y;
    switch (tool) {
      case "wall":  if (!isStart && !isEnd) walls[i] = 1; break;
      case "erase": walls[i] = 0; break;
      case "start": if (!isEnd && !walls[i]) start = { x, y }; break;
      case "end":   if (!isStart && !walls[i]) end = { x, y }; break;
    }
    reset();
  }

  canvas.addEventListener("pointerdown", (e) => {
    painting = true; canvas.setPointerCapture(e.pointerId);
    applyTool(...Object.values(cellFromEvent(e)));
  });
  canvas.addEventListener("pointermove", (e) => {
    if (!painting) return;
    const { x, y } = cellFromEvent(e);
    // drag only paints walls/erase to avoid dropping many start/end
    if (tool === "wall" || tool === "erase") applyTool(x, y);
  });
  canvas.addEventListener("pointerup", () => { painting = false; });
  canvas.addEventListener("pointercancel", () => { painting = false; });

  // ---------- Responsive sizing ----------
  function fit() {
    // keep internal resolution crisp relative to display size
    const displayW = canvas.clientWidth;
    const ratio = ROWS / COLS;
    canvas.width = Math.round(displayW * (window.devicePixelRatio || 1));
    canvas.height = Math.round(canvas.width * ratio);
    cell = canvas.width / COLS;
    draw(search);
  }
  window.addEventListener("resize", fit);

  // ---------- Init ----------
  fit();
  draw(null);
  statsText(null);
})();
</script>
</body>
</html>
